name: Tests and Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run classifier unit tests
      run: |
        pytest tests/test_classifier.py -v --cov=src --cov-report=term-missing

    # API agreement test is skipped in CI because it requires live
    # ClinicalTrials.gov network access and would be flaky on hosted
    # runners. Run locally to validate.

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install linters
      run: |
        pip install ruff black

    - name: Run ruff
      run: ruff check src/ tests/ || true

    - name: Run black (check mode)
      run: black --check src/ tests/ || true

  paper:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra texlive-bibtex-extra biber

    - name: Build PDF
      working-directory: paper
      run: make

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: paper-pdf
        path: paper/main.pdf
